<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keevo</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Keevo">
<meta name="theme-color" content="#18181B">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-base:#FAFAF7;
    --panel:#F3F2EE;
    --panel-border:#E5E2DA;
    --panel-border-hover:#D2CEC3;
    --text-primary:#18181B;
    --text-muted:#86837C;
    --light-ok:#2FA968;
    --light-warn:#EF9D34;
    --light-danger:#F0573D;
    --light-none:#D6D3C9;
    --radius:16px;
    --radius-sm:10px;
    --radius-pill:999px;
    --font-display:'Inter',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'Inter',sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg-base);
    color:var(--text-primary);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
  }
  button,input,select,textarea{font-family:inherit;}
  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{
    outline:2px solid var(--light-warn);
    outline-offset:2px;
  }

  .app-shell{max-width:880px;margin:0 auto;padding:24px 16px 64px;}

  .header{position:fixed;top:0;left:0;right:0;z-index:30;background:var(--bg-base);
    display:flex;flex-direction:column;align-items:flex-start;gap:8px;
    padding:12px 16px 10px;border-bottom:1px solid var(--panel-border);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
  .header-spacer{height:90px;}
  .header-top{display:flex;justify-content:space-between;align-items:center;width:100%;}
  .header-bottom{display:flex;align-items:center;width:100%;}
  .header-left{display:flex;align-items:center;gap:12px;min-width:0;}
  .header-title{font-family:var(--font-display);font-weight:800;font-size:22px;letter-spacing:-0.01em;
    margin:0;line-height:1;color:var(--text-primary);white-space:nowrap;}

  .cat-dropdown-wrap{position:relative;}
  .cat-dropdown-btn{display:flex;align-items:center;gap:7px;padding:8px 12px;
    border:1px solid var(--panel-border);border-radius:var(--radius-pill);
    background:#fff;color:var(--text-primary);cursor:pointer;font-size:13px;font-weight:600;
    white-space:nowrap;max-width:200px;}
  .cat-dropdown-btn svg.tab-icon{width:15px;height:15px;flex-shrink:0;}
  .cat-dropdown-btn .cat-dropdown-chevron{width:13px;height:13px;color:var(--text-muted);
    transition:transform .15s;flex-shrink:0;margin-left:2px;}
  .cat-dropdown-btn.open .cat-dropdown-chevron{transform:rotate(180deg);}
  .cat-dropdown-btn .tab-badge{flex-shrink:0;}
  .cat-dropdown-name{overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}

  .cat-dropdown-menu{position:absolute;top:calc(100% + 6px);left:0;min-width:220px;
    background:#fff;border:1px solid var(--panel-border);border-radius:var(--radius);
    box-shadow:0 8px 24px rgba(20,20,16,0.12);z-index:100;overflow:hidden;
    opacity:0;transform:translateY(-6px);pointer-events:none;
    transition:opacity .15s ease,transform .15s ease;}
  .cat-dropdown-menu.open{opacity:1;transform:translateY(0);pointer-events:all;}
  .cat-dropdown-item{display:flex;align-items:center;gap:10px;padding:11px 14px;
    cursor:pointer;border:none;background:none;width:100%;text-align:left;font-size:13.5px;
    color:var(--text-muted);border-bottom:1px solid var(--panel-border);}
  .cat-dropdown-item:last-child{border-bottom:none;}
  .cat-dropdown-item:hover{background:var(--bg-base);color:var(--text-primary);}
  .cat-dropdown-item.active{color:var(--text-primary);font-weight:600;background:var(--panel);}
  .cat-dropdown-item svg{width:16px;height:16px;flex-shrink:0;}
  .cat-dropdown-item-name{flex:1;}
  .cat-dropdown-divider{height:1px;background:var(--panel-border);margin:4px 0;}
  .cat-dropdown-add{color:var(--text-muted);font-style:normal;opacity:.85;}
  .cat-dropdown-add:hover{opacity:1;}

  .header-date{font-size:12px;color:var(--text-muted);white-space:nowrap;flex-shrink:0;}

  .summary{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px;}
  .summary-card{flex:1;min-width:125px;background:var(--panel);border:1px solid var(--panel-border);
    border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:11px;}
  .summary-light{width:11px;height:11px;border-radius:50%;flex-shrink:0;background:var(--light-none);}
  .summary-light.lit-danger{background:var(--light-danger);}
  .summary-light.lit-warn{background:var(--light-warn);}
  .summary-light.lit-ok{background:var(--light-ok);}
  .summary-light.pulse{animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
  @media (prefers-reduced-motion:reduce){.summary-light.pulse{animation:none;}}
  .summary-count{font-size:22px;font-weight:700;line-height:1;}
  .summary-label{font-size:10.5px;color:var(--text-muted);letter-spacing:0.02em;margin-top:3px;}

  .tab-icon{width:15px;height:15px;flex-shrink:0;}
  .tab-label{font-weight:600;font-size:13px;}
  .tab-badge{font-size:10.5px;font-weight:600;background:var(--light-danger);color:#fff;border-radius:var(--radius-pill);
    padding:1px 6px;line-height:1.4;}

  .category-toolbar-sub{font-size:12px;color:var(--text-muted);margin-top:3px;}
  .item-context{display:inline-block;font-size:10.5px;color:var(--text-muted);background:var(--bg-base);
    border:1px solid var(--panel-border);border-radius:var(--radius-pill);padding:2px 8px;margin-top:5px;}
  .overview-bubble-header{display:flex;align-items:center;gap:9px;padding:14px 16px;border-bottom:1px solid var(--panel-border);}
  .overview-bubble-icon{width:17px;height:17px;color:var(--text-muted);flex-shrink:0;}
  .overview-bubble-title{font-weight:600;font-size:14px;flex:1;color:var(--text-primary);}

  .category-content{display:flex;flex-direction:column;}
  .category-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px;}
  .category-toolbar-actions{display:flex;gap:4px;flex-shrink:0;}
  .category-toolbar-title{font-family:var(--font-display);font-weight:700;font-size:20px;
    min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-primary);}

  .filter-row{display:flex;gap:8px;margin-bottom:18px;}
  .filter-btn{font-size:12.5px;padding:7px 14px;border-radius:var(--radius-pill);border:1px solid var(--panel-border);
    background:#fff;color:var(--text-muted);cursor:pointer;}
  .filter-btn.active{background:var(--text-primary);color:#fff;border-color:var(--text-primary);}
  .filter-btn:hover{border-color:var(--panel-border-hover);}

  .entities-grid{display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:14px;}
  @media (min-width:700px){.entities-grid{grid-template-columns:1fr 1fr;}}

  .panel{background:var(--panel);border:1px solid var(--panel-border);border-radius:var(--radius);
    overflow:hidden;align-self:start;}
  .panel-header{display:flex;align-items:center;gap:8px;padding:14px 16px;cursor:pointer;user-select:none;}
  .panel-name{font-weight:600;font-size:15px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;
    white-space:nowrap;color:var(--text-primary);}
  .panel-badge{font-size:11.5px;font-weight:500;padding:2px 8px;border-radius:var(--radius-pill);
    background:#fff;color:var(--text-muted);border:1px solid var(--panel-border);flex-shrink:0;}
  .panel-badge.has-issues{color:var(--light-danger);border-color:rgba(240,87,61,0.35);}
  .panel-chevron{width:15px;height:15px;color:var(--text-muted);transition:transform .15s ease;flex-shrink:0;}
  .panel.collapsed .panel-chevron{transform:rotate(-90deg);}
  .icon-btn.panel-rename:hover{color:var(--light-warn);}
  .icon-btn.panel-delete:hover{color:var(--light-danger);}
  .icon-btn{flex-shrink:0;}

  .item-list{border-top:1px solid var(--panel-border);}
  .panel.collapsed .item-list{display:none;}
  .item-row{display:flex;align-items:flex-start;gap:11px;padding:12px 16px;border-bottom:1px solid var(--panel-border);}
  .item-row:last-child{border-bottom:none;}
  .item-light{width:9px;height:9px;border-radius:50%;flex-shrink:0;background:var(--light-none);margin-top:5px;}
  .item-light.s-overdue{background:var(--light-danger);}
  .item-light.s-warning{background:var(--light-warn);}
  .item-light.s-ok{background:var(--light-ok);}
  .item-info{flex:1;min-width:0;}
  .item-name{font-size:13.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-primary);}
  .item-notes{font-size:11.5px;color:var(--text-muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .item-due{font-size:12px;font-weight:500;color:var(--text-muted);text-align:right;white-space:nowrap;flex-shrink:0;}
  .item-due.s-overdue{color:var(--light-danger);}
  .item-due.s-warning{color:var(--light-warn);}
  .item-due-rel{font-size:10px;font-weight:400;opacity:.85;margin-top:1px;}
  .item-actions{display:flex;gap:4px;flex-shrink:0;}
  .icon-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);
    border:1px solid transparent;background:transparent;color:var(--text-muted);cursor:pointer;padding:0;}
  .icon-btn svg{width:13px;height:13px;}
  .icon-btn:hover{background:#fff;color:var(--text-primary);border-color:var(--panel-border);}
  .icon-btn.done-btn:hover{color:var(--light-ok);}
  .icon-btn.delete-btn:hover{color:var(--light-danger);}

  @media (max-width:480px){
    .item-row{flex-wrap:wrap;}
    .item-info{order:1;flex:1 1 auto;}
    .item-actions{order:2;}
    .item-due{order:3;flex:1 1 100%;display:flex;gap:14px;text-align:left;margin:5px 0 0 20px;}
  }

  .empty-row{padding:16px 14px;font-size:12.5px;color:var(--text-muted);text-align:center;}
  .empty-state{padding:28px 16px;text-align:center;color:var(--text-muted);font-size:13px;background:var(--panel);
    border:1px solid var(--panel-border);border-radius:var(--radius);margin-bottom:14px;}
  .add-item-row{padding:10px 16px;border-top:1px solid var(--panel-border);}
  .add-item-btn{font-size:12.5px;color:var(--text-muted);background:none;border:none;cursor:pointer;
    display:flex;align-items:center;gap:6px;padding:4px 0;}
  .add-item-btn svg{width:13px;height:13px;}
  .add-item-btn:hover{color:var(--text-primary);}

  .add-entity-btn{font-size:13px;font-weight:500;color:var(--text-muted);background:#fff;
    border:1px dashed var(--panel-border-hover);border-radius:var(--radius);padding:13px 18px;cursor:pointer;
    width:100%;display:flex;align-items:center;justify-content:center;gap:6px;}
  .add-entity-btn svg{width:13px;height:13px;}
  .add-entity-btn:hover{color:var(--text-primary);border-color:var(--text-muted);}

  .footer-search-wrap{position:relative;margin:30px 0 14px;}
  .footer-search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:15px;height:15px;
    color:var(--text-muted);pointer-events:none;}
  .footer-search-input{width:100%;padding:11px 14px 11px 38px;border-radius:var(--radius-pill);
    border:1px solid var(--panel-border);background:#fff;color:var(--text-primary);font-size:13.5px;}
  .footer-search-input::placeholder{color:var(--text-muted);}
  .footer-search-input:focus{outline:2px solid var(--light-warn);outline-offset:1px;}
  .search-results-panel{margin-bottom:14px;}
  .search-empty{padding:14px;text-align:center;font-size:12.5px;color:var(--text-muted);margin-bottom:14px;}

  .icon-btn.fav-btn:hover{color:var(--light-warn);}
  .icon-btn.fav-btn.active{color:var(--light-warn);}
  .icon-btn.fav-btn.active svg{fill:currentColor;}

  .favorites-section{background:var(--panel);border:1px solid var(--panel-border);border-radius:var(--radius);
    margin-bottom:16px;overflow:hidden;}
  .favorites-header{display:flex;align-items:center;gap:9px;padding:13px 16px;cursor:pointer;user-select:none;}
  .favorites-icon{width:16px;height:16px;color:var(--light-warn);flex-shrink:0;}
  .favorites-title{font-weight:600;font-size:14px;flex:1;color:var(--text-primary);}
  .favorites-chevron{transition:transform .15s ease;}
  .favorites-section.collapsed .favorites-chevron{transform:rotate(-90deg);}
  .favorites-section.collapsed .item-list{display:none;}
  .favorites-section .item-list{border-top:1px solid var(--panel-border);}

  .footer-actions{text-align:center;margin-top:24px;display:flex;flex-direction:column;align-items:center;gap:12px;}
  .footer-sync-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
  .btn-save{display:flex;align-items:center;gap:8px;padding:11px 22px;}
  .save-icon{width:15px;height:15px;}
  .btn-save.is-dirty{background:var(--light-warn);border-color:var(--light-warn);color:#fff;}
  .btn-sync{display:flex;align-items:center;gap:7px;padding:9px 16px;font-size:13px;font-weight:500;
    border-radius:var(--radius-sm);border:1px solid var(--panel-border);background:#fff;
    color:var(--text-primary);cursor:pointer;}
  .btn-sync svg{width:15px;height:15px;}
  .btn-sync:hover{border-color:var(--panel-border-hover);background:var(--bg-base);}
  .footer-reset{font-size:11.5px;color:var(--text-muted);background:none;border:none;
    cursor:pointer;opacity:.7;}
  .footer-reset:hover{opacity:1;color:var(--text-primary);}

  .qr-modal-body{display:flex;flex-direction:column;align-items:center;gap:16px;padding:8px 0;}
  .qr-canvas-wrap{background:#fff;border:1px solid var(--panel-border);border-radius:var(--radius);
    padding:16px;display:flex;align-items:center;justify-content:center;}
  .qr-canvas-wrap canvas{display:block;}
  .qr-hint{font-size:12.5px;color:var(--text-muted);text-align:center;line-height:1.5;}
  .qr-hint strong{color:var(--text-primary);}
  .import-drop{border:2px dashed var(--panel-border);border-radius:var(--radius);padding:24px;
    text-align:center;cursor:pointer;transition:border-color .15s;}
  .import-drop:hover{border-color:var(--panel-border-hover);}
  .import-drop svg{width:28px;height:28px;color:var(--text-muted);margin-bottom:8px;}
  .import-drop-label{font-size:13px;color:var(--text-muted);}
  .import-drop-sub{font-size:11.5px;color:var(--text-muted);margin-top:4px;opacity:.7;}
  .import-merge-opts{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
  .import-opt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid var(--panel-border);
    border-radius:var(--radius-sm);cursor:pointer;background:#fff;}
  .import-opt:hover{border-color:var(--panel-border-hover);}
  .import-opt input[type=radio]{margin-top:2px;flex-shrink:0;accent-color:var(--text-primary);}
  .import-opt-label{font-size:13px;font-weight:500;color:var(--text-primary);}
  .import-opt-desc{font-size:11.5px;color:var(--text-muted);margin-top:2px;}

  .loading{padding:70px 20px;text-align:center;color:var(--text-muted);font-size:13px;}

  .modal-overlay{position:fixed;inset:0;background:rgba(24,24,22,.45);display:flex;align-items:center;
    justify-content:center;padding:18px;z-index:50;}
  .modal{background:#fff;border:1px solid var(--panel-border);border-radius:var(--radius);
    width:100%;max-width:420px;max-height:90vh;overflow-y:auto;padding:24px;
    box-shadow:0 12px 32px rgba(20,20,16,0.14);}
  .modal-title{font-family:var(--font-display);font-size:18px;font-weight:700;margin:0 0 18px;color:var(--text-primary);}
  .field{margin-bottom:14px;}
  .field-label{display:block;font-size:11px;letter-spacing:0.02em;
    color:var(--text-muted);margin-bottom:6px;}
  .field-input,.field-select,.field-textarea{width:100%;background:var(--bg-base);border:1px solid var(--panel-border);
    border-radius:var(--radius-sm);padding:9px 11px;color:var(--text-primary);font-size:14px;}
  .field-textarea{resize:vertical;min-height:48px;font-family:var(--font-body);}
  .field-row{display:flex;gap:10px;}
  .field-row .field{flex:1;}
  .modal-actions{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:10px;}
  .modal-actions-right{display:flex;gap:8px;margin-left:auto;}
  .btn{font-size:13px;font-weight:500;padding:9px 16px;border-radius:var(--radius-sm);border:1px solid var(--panel-border);
    cursor:pointer;background:transparent;color:var(--text-primary);}
  .btn-secondary:hover{background:var(--bg-base);}
  .btn-primary{background:var(--text-primary);border-color:var(--text-primary);color:#fff;}
  .btn-primary:hover{background:#34333A;}
  .btn-danger{color:var(--light-danger);border-color:rgba(240,87,61,.35);background:transparent;}
  .btn-danger:hover{background:rgba(240,87,61,.08);}

  .toast{position:fixed;bottom:16px;right:16px;background:#fff;border:1px solid var(--panel-border);
    color:var(--text-muted);font-size:11.5px;padding:8px 13px;border-radius:var(--radius-sm);
    box-shadow:0 4px 14px rgba(20,20,16,0.1);
    opacity:0;transform:translateY(6px);transition:opacity .2s,transform .2s;pointer-events:none;z-index:60;}
  .toast.show{opacity:1;transform:translateY(0);}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
<div id="app-header"></div>
<div class="header-spacer"></div>
<div class="app-shell">
  <div id="app"></div>
  <div id="app-footer"></div>
</div>
<div id="modal-root"></div>
<div id="toast" class="toast"></div>

<script>
const STORAGE_KEY = 'lifeadmin-data';
let state = null;
let collapsedSet = new Set();
let filterMode = 'all';
let idCounter = 0;
let searchQuery = '';
let favoritesCollapsed = false;
const OVERVIEW_ID = '__overview__';
const OVERVIEW_DAYS = 21;

const ICONS = {
  car: '<path d="M4 16l1.5-5.5A2 2 0 0 1 7.4 9h9.2a2 2 0 0 1 1.9 1.5L20 16"/><path d="M3 16h18v2.5A1.5 1.5 0 0 1 19.5 20h-1A1.5 1.5 0 0 1 17 18.5V18H7v.5A1.5 1.5 0 0 1 5.5 20h-1A1.5 1.5 0 0 1 3 18.5V16Z"/><circle cx="7.5" cy="16.5" r="1.4"/><circle cx="16.5" cy="16.5" r="1.4"/>',
  home: '<path d="M4 11.5 12 4l8 7.5"/><path d="M6 10v9.5a.5.5 0 0 0 .5.5h11a.5.5 0 0 0 .5-.5V10"/><path d="M10 20v-5h4v5"/>',
  heart: '<path d="M12 19.5 4.6 12.6a4.6 4.6 0 0 1 6.5-6.5l.9.9.9-.9a4.6 4.6 0 0 1 6.5 6.5L12 19.5Z"/>',
  coin: '<circle cx="12" cy="12" r="8.2"/><path d="M12 7.5v9M9.6 9.3c0-1 1-1.8 2.4-1.8s2.4.7 2.4 1.7c0 2.4-4.8 1-4.8 3.4 0 1 1 1.8 2.4 1.8s2.4-.8 2.4-1.8"/>',
  idcard: '<rect x="3" y="6" width="18" height="13" rx="1.4"/><circle cx="8" cy="11.3" r="1.8"/><path d="M5.3 16c.4-1.5 1.6-2.3 2.7-2.3s2.3.8 2.7 2.3"/><path d="M13.5 10.5h5M13.5 13h5M13.5 15.5h3.2"/>',
  paw: '<circle cx="7" cy="9" r="1.6"/><circle cx="11.2" cy="6.8" r="1.6"/><circle cx="15.4" cy="6.8" r="1.6"/><circle cx="19" cy="9" r="1.6"/><path d="M9 16.2c0-2.3 2-4.2 4-4.2s4 1.9 4 4.2-1.8 3.3-4 3.3-4-1-4-3.3Z"/>',
  wifi: '<path d="M4.5 9.8a10.7 10.7 0 0 1 15 0"/><path d="M7.3 13a6.9 6.9 0 0 1 9.4 0"/><path d="M10.1 16.2a3.1 3.1 0 0 1 3.8 0"/><circle cx="12" cy="19" r="1"/>',
  clock: '<circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3.2 2"/>',
  child: '<circle cx="12" cy="7" r="3"/><path d="M7 21v-4.5A5 5 0 0 1 12 12a5 5 0 0 1 5 4.5V21"/>',

function svgIcon(name, cls){
  return '<svg class="'+(cls||'')+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">'+(ICONS[name]||ICONS.dot)+'</svg>';
}
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

function pad(n){ return n<10 ? '0'+n : ''+n; }
function parseDate(s){ if(!s) return null; const p=s.split('-').map(Number); return new Date(p[0],p[1]-1,p[2]); }
function formatISO(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function formatDisplay(s){ const d=parseDate(s); if(!d) return '—'; return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear(); }
function startOfDay(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function addMonths(s, n){ const d = parseDate(s) || startOfDay(new Date()); d.setMonth(d.getMonth()+n); return formatISO(d); }
function diffDaysFromToday(s){ const d=parseDate(s); if(!d) return null; const t=startOfDay(new Date()); return Math.round((d-t)/86400000); }
function computeStatus(it){
  if(!it.dueDate) return 'none';
  const diff = diffDaysFromToday(it.dueDate);
  if(diff<0) return 'overdue';
  if(diff<=30) return 'warning';
  return 'ok';
}
function dayWord(n){ const a=Math.abs(n); if(a===1) return 'deň'; if(a>=2 && a<=4) return 'dni'; return 'dní'; }
function relativeLabel(it){
  if(!it.dueDate) return 'termín nenastavený';
  const diff = diffDaysFromToday(it.dueDate);
  if(diff===0) return 'dnes';
  if(diff>0) return 'o '+diff+' '+dayWord(diff);
  return 'po termíne, '+Math.abs(diff)+' '+dayWord(diff);
}
function statusSortKey(s){ return s==='overdue'?0 : s==='warning'?1 : s==='ok'?2 : 3; }
function genId(prefix){ idCounter++; return prefix+'_'+Date.now().toString(36)+idCounter+Math.random().toString(36).slice(2,5); }

const DEFAULT_ITEM_TEMPLATES = {
  auto: [['STK a emisie',24],['Diaľničná známka',12],['PZP – povinné zmluvné poistenie',12],['Havarijné poistenie',12],['Servis a výmena oleja',12]],
  domacnost: [['Poistenie nehnuteľnosti',12],['Daň z nehnuteľností',12],['Kontrola kotla',12],['Revízia elektrickej inštalácie',60]],
  zdravie: [['Zubár – preventívna prehliadka',6],['Všeobecný lekár – prehliadka',12],['Očné vyšetrenie',24],['Gynekológ / urológ',12]],
  deti: [['Pediater – preventívna prehliadka',12],['Zubár – preventívna prehliadka',6],['Povinné očkovanie',12],['Očné vyšetrenie',24],['Zápis do školy / škôlky',null],['Krúžky – platba',12]],
  financie: [['Životné poistenie',12],['Daňové priznanie',12],['Úrazové poistenie',12]],
  doklady: [['Občiansky preukaz',null],['Cestovný pas',null],['Vodičský preukaz',null]],
  zvierata: [['Veterinárna kontrola',12],['Očkovanie',12],['Antiparazitická liečba',6]],
  predplatne: [['Mobilná tarifa',12],['Energie – ročné vyúčtovanie',12],['Streamovacie predplatné',12]]
};
function itemsFromTemplate(category, entityId){
  const tmpl = (category && category.itemTemplate) ? category.itemTemplate :
    (DEFAULT_ITEM_TEMPLATES[category ? category.id : null] || []);
  return tmpl.map(function(pair){
    return {id:genId('i'), entityId:entityId, name:pair[0], dueDate:null, lastDone:null, intervalMonths:pair[1], notes:''};
  });
}
function cloneTemplate(tmpl){
  return (tmpl||[]).map(function(p){ return [p[0], p[1]]; });
}

function buildDefaultData(){
  const categories = [
    {id:'auto', name:'Auto', icon:'car', entityLabel:'Auto'},
    {id:'domacnost', name:'Domácnosť', icon:'home', entityLabel:'Nehnuteľnosť'},
    {id:'zdravie', name:'Zdravie', icon:'heart', entityLabel:'Osoba'},
    {id:'deti', name:'Deti', icon:'child', entityLabel:'Dieťa'},
    {id:'financie', name:'Financie', icon:'coin', entityLabel:'Skupina'},
    {id:'doklady', name:'Osobné doklady', icon:'idcard', entityLabel:'Osoba'},
    {id:'zvierata', name:'Domáce zvieratá', icon:'paw', entityLabel:'Zviera'},
    {id:'predplatne', name:'Predplatné a účty', icon:'wifi', entityLabel:'Skupina'}
  ];
  categories.forEach(function(c){ c.itemTemplate = cloneTemplate(DEFAULT_ITEM_TEMPLATES[c.id]); });
  const noDefaultEntity = ['zvierata','deti'];
  const entities = [];
  categories.forEach(function(c){ if(noDefaultEntity.indexOf(c.id)<0) entities.push({id:'e_'+c.id, categoryId:c.id, name:c.name}); });
  let items = [];
  const catById = {};
  categories.forEach(function(c){ catById[c.id]=c; });
  entities.forEach(function(ent){ items = items.concat(itemsFromTemplate(catById[ent.categoryId], ent.id)); });
  return {categories:categories, entities:entities, items:items, activeCategoryId:'auto'};
}

function ensureNewCategories(state){
  if(!state.categories.some(function(c){ return c.id==='deti'; })){
    state.categories.push({id:'deti', name:'Deti', icon:'child', entityLabel:'Dieťa', itemTemplate: cloneTemplate(DEFAULT_ITEM_TEMPLATES.deti)});
  }
  state.categories.forEach(function(c){
    if(!c.itemTemplate && DEFAULT_ITEM_TEMPLATES[c.id]) c.itemTemplate = cloneTemplate(DEFAULT_ITEM_TEMPLATES[c.id]);
  });
  return state;
}

function migrate(loaded){
  if(loaded && Array.isArray(loaded.entities) && Array.isArray(loaded.categories) && Array.isArray(loaded.items)){
    loaded.categories.forEach(function(c){ if(!c.entityLabel) c.entityLabel = c.name; });
    if(!loaded.activeCategoryId || !loaded.categories.some(function(c){return c.id===loaded.activeCategoryId;})){
      loaded.activeCategoryId = loaded.categories.length ? loaded.categories[0].id : null;
    }
    return ensureNewCategories(loaded);
  }
  if(loaded && Array.isArray(loaded.categories) && Array.isArray(loaded.items)){
    const entities = loaded.categories.map(function(c){ return {id:'e_'+c.id, categoryId:c.id, name:c.name}; });
    const items = loaded.items.map(function(i){
      return {id:i.id, entityId:'e_'+i.categoryId, name:i.name, dueDate:i.dueDate, lastDone:i.lastDone, intervalMonths:i.intervalMonths, notes:i.notes};
    });
    const categories = loaded.categories.map(function(c){ return {id:c.id, name:c.name, icon:c.icon, entityLabel:c.name}; });
    return ensureNewCategories({categories:categories, entities:entities, items:items, activeCategoryId: categories.length?categories[0].id:null});
  }
  return buildDefaultData();
}

async function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){ state = migrate(JSON.parse(raw)); }
    else { state = buildDefaultData(); }
  }catch(e){
    state = buildDefaultData();
  }
  state.activeCategoryId = OVERVIEW_ID;
  await persist();
  render();
}

let saveTimer=null;
let isDirty=false;
function scheduleSave(){
  isDirty = true;
  updateSaveButton();
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(persist, 200);
}
async function persist(manual){
  if(saveTimer){ clearTimeout(saveTimer); saveTimer=null; }
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    isDirty = false;
    updateSaveButton();
    showToast(manual ? 'Dáta uložené' : 'Uložené');
  }catch(e){
    showToast('Chyba pri ukladaní');
  }
}
function updateSaveButton(){
  const btn = document.getElementById('manual-save-btn');
  if(!btn) return;
  btn.classList.toggle('is-dirty', isDirty);
  btn.title = isDirty ? 'Sú tu neuložené zmeny – kliknutím uložíš ihneď' : 'Všetko je uložené';
}

let toastTimer=null;
function showToast(text){
  const t=document.getElementById('toast');
  t.textContent=text;
  t.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ t.classList.remove('show'); }, 1500);
}

function getCounts(){
  let overdue=0, warning=0, ok=0, none=0;
  state.items.forEach(function(it){
    const s=computeStatus(it);
    if(s==='overdue') overdue++;
    else if(s==='warning') warning++;
    else if(s==='ok') ok++;
    else none++;
  });
  return {overdue:overdue, warning:warning, ok:ok, none:none};
}

function getCategoryIssueCount(categoryId){
  const entIds = state.entities.filter(function(e){return e.categoryId===categoryId;}).map(function(e){return e.id;});
  return state.items.filter(function(i){ return entIds.indexOf(i.entityId)>=0; })
    .filter(function(i){ const s=computeStatus(i); return s==='overdue'||s==='warning'; }).length;
}

function isUrgent(it){
  if(!it.dueDate) return false;
  const d = diffDaysFromToday(it.dueDate);
  return d!==null && d<=OVERVIEW_DAYS;
}
function getOverviewItems(){
  return state.items.filter(isUrgent).slice().sort(function(a,b){
    return diffDaysFromToday(a.dueDate)-diffDaysFromToday(b.dueDate);
  });
}
function getItemContext(it){
  const ent = state.entities.find(function(e){ return e.id===it.entityId; });
  if(!ent) return '';
  const cat = state.categories.find(function(c){ return c.id===ent.categoryId; });
  return (cat?cat.name:'')+' · '+ent.name;
}

    '<div class="item-light s-'+status+'"></div>'+

      '<div class="item-name">'+escapeHtml(it.name)+'</div>'+

function renderEntity(ent){
  let allItems = state.items.filter(function(i){ return i.entityId===ent.id; });

    items = items.filter(function(i){ const s=computeStatus(i); return s==='overdue'||s==='warning'; });

  const issues = allItems.filter(function(i){ const s=computeStatus(i); return s==='overdue'||s==='warning'; }).length;
  const collapsed = collapsedSet.has(ent.id);
  const rowsHtml = items.length ? items.map(function(i){ return renderItemRow(i); }).join('') :

function renderOverviewContent(){
  const items = getOverviewItems();
  let body;
  if(!items.length){
    body = '<div class="empty-state">Žiadne úlohy s termínom do 3 týždňov. Všetko je pod kontrolou.</div>';
  } else {
    const order = [];
    const groups = {};
    items.forEach(function(it){
      const ent = state.entities.find(function(e){ return e.id===it.entityId; });
      const catId = ent ? ent.categoryId : '__none__';
      if(!groups[catId]){
        groups[catId] = { category: ent ? state.categories.find(function(c){ return c.id===catId; }) : null, items: [] };
        order.push(catId);
      }
      groups[catId].items.push(it);
    });
    const bubbles = order.map(function(catId){
      const g = groups[catId];
      const catName = g.category ? g.category.name : 'Iné';
      const catIcon = g.category ? g.category.icon : 'dot';
      const rows = g.items.map(function(it){
        const ent = state.entities.find(function(e){ return e.id===it.entityId; });
        return renderItemRow(it, ent ? ent.name : '');
      }).join('');
      return '<div class="panel overview-bubble">'+
        '<div class="overview-bubble-header">'+
          svgIcon(catIcon,'overview-bubble-icon')+
          '<div class="overview-bubble-title">'+escapeHtml(catName)+'</div>'+
          '<div class="panel-badge has-issues">'+g.items.length+'</div>'+
        '</div>'+
        '<div class="item-list">'+rows+'</div>'+
      '</div>';
    }).join('');
    body = '<div class="entities-grid">'+bubbles+'</div>';
  }
  return '<div class="category-content">'+
    '<div class="category-toolbar"><div>'+
      '<div class="category-toolbar-title">Najbližšie termíny</div>'+
      '<div class="category-toolbar-sub">Úlohy s termínom do 3 týždňov, vrátane tých po splatnosti</div>'+
    '</div></div>'+
    body+
  '</div>';
}

function renderSearchResults(){

  if(!q) return '';
  const matches = state.items.filter(function(it){
    return it.name.toLowerCase().indexOf(q)>=0 || (it.notes && it.notes.toLowerCase().indexOf(q)>=0);
  });
  if(!matches.length) return '<div class="search-empty">Žiadne výsledky pre „'+escapeHtml(searchQuery)+'“</div>';
  const rows = matches.map(function(it){ return renderItemRow(it, getItemFullContext(it)); }).join('');
  return '<div class="panel search-results-panel"><div class="item-list">'+rows+'</div></div>';
}

function exportJSON(){
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const d = new Date();
  a.download = 'prehlad-zaloha-'+d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'.json';
  a.click();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  showToast('Súbor sa sťahuje…');
}

function mergeImport(imported, mode){
  if(mode === 'replace'){
    state = imported;
    state.activeCategoryId = OVERVIEW_ID;
    render(); scheduleSave();
    showToast('Dáta nahradené');
    return;
  }
  // Merge: pridaj nové, zachovaj existujúce
  const catIds = state.categories.map(function(c){ return c.id; });
  (imported.categories||[]).forEach(function(c){ if(catIds.indexOf(c.id)<0) state.categories.push(c); });
  const entIds = state.entities.map(function(e){ return e.id; });
  (imported.entities||[]).forEach(function(e){ if(entIds.indexOf(e.id)<0) state.entities.push(e); });
  const itIds = state.items.map(function(i){ return i.id; });
  (imported.items||[]).forEach(function(i){ if(itIds.indexOf(i.id)<0) state.items.push(i); });
  render(); scheduleSave();
  showToast('Dáta zlúčené');
}

function onAppClick(e){
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;
  if(action==='toggle-cat-dropdown'){
    toggleDropdown();
  } else if(action==='select-category'){
    state.activeCategoryId = el.dataset.category;
    dropdownOpen = false;
    render(); scheduleSave();
  } else if(action==='toggle-collapse'){
    const id = el.dataset.entity;
    if(collapsedSet.has(id)) collapsedSet.delete(id); else collapsedSet.add(id);
    render();
  } else if(action==='set-filter'){
    filterMode = el.dataset.filter; render();
  } else if(action==='open-add-item'){
    openItemModal(null, el.dataset.entity);
  } else if(action==='open-edit-item'){
    const it = state.items.find(function(i){ return i.id===el.dataset.item; });
    openItemModal(it);
  } else if(action==='mark-done'){
    markDone(el.dataset.item);
  } else if(action==='toggle-favorite'){
    const it = state.items.find(function(i){ return i.id===el.dataset.item; });
    if(it){ it.favorite = !it.favorite; render(); scheduleSave(); }
  } else if(action==='toggle-favorites-collapse'){
    favoritesCollapsed = !favoritesCollapsed; render();
  } else if(action==='delete-item'){
    const it = state.items.find(function(i){ return i.id===el.dataset.item; });
    openConfirm('Naozaj chceš vymazať položku „'+(it?it.name:'')+'“?', function(){
      state.items = state.items.filter(function(i){ return i.id!==el.dataset.item; });
      render(); scheduleSave();
    });
  } else if(action==='rename-entity'){
    const ent = state.entities.find(function(en){ return en.id===el.dataset.entity; });
    if(ent) openRenameModal(ent);
  } else if(action==='duplicate-entity'){
    duplicateEntity(el.dataset.entity);
  } else if(action==='delete-entity'){
    const entId = el.dataset.entity;
    const ent = state.entities.find(function(en){ return en.id===entId; });
    const count = state.items.filter(function(i){ return i.entityId===entId; }).length;
    const msg = count>0 ?
      'Záznam „'+(ent?ent.name:'')+'“ obsahuje '+count+' položiek. Vymazaním sa vymažú aj všetky jeho položky. Naozaj pokračovať?' :
      'Naozaj chceš vymazať záznam „'+(ent?ent.name:'')+'“?';
    openConfirm(msg, function(){
      state.entities = state.entities.filter(function(en){ return en.id!==entId; });
      state.items = state.items.filter(function(i){ return i.entityId!==entId; });
      render(); scheduleSave();
    });
  } else if(action==='open-add-entity'){
    openAddEntityModal(el.dataset.category);
  } else if(action==='edit-category'){
    const cat = state.categories.find(function(c){ return c.id===el.dataset.category; });
    if(cat) openCategoryModal(cat);
  } else if(action==='duplicate-category'){
    duplicateCategory(el.dataset.category);
  } else if(action==='delete-category'){
    const id = el.dataset.category;
    const cat = state.categories.find(function(c){ return c.id===id; });
    const entIds = state.entities.filter(function(en){ return en.categoryId===id; }).map(function(en){ return en.id; });
    const itemCount = state.items.filter(function(i){ return entIds.indexOf(i.entityId)>=0; }).length;
    const msg = (entIds.length>0 || itemCount>0) ?
      'Kategória „'+(cat?cat.name:'')+'“ obsahuje '+entIds.length+' záznamov a '+itemCount+' položiek. Vymazaním kategórie sa vymaže všetko v nej. Naozaj pokračovať?' :
      'Naozaj chceš vymazať túto kategóriu?';
    openConfirm(msg, function(){
      state.categories = state.categories.filter(function(c){ return c.id!==id; });
      state.entities = state.entities.filter(function(en){ return en.categoryId!==id; });
      state.items = state.items.filter(function(i){ return entIds.indexOf(i.entityId)<0; });
      if(state.activeCategoryId===id){ state.activeCategoryId = state.categories.length ? state.categories[0].id : null; }
      render(); scheduleSave();
    });
  } else if(action==='open-add-category'){
    openCategoryModal();
  } else if(action==='manual-save'){
    persist(true);
  } else if(action==='export-json'){
    exportJSON();
  } else if(action==='import-json'){
    openImportModal(null);
  } else if(action==='show-qr'){
    openQRModal();
  } else if(action==='reset-all'){
    openConfirm('Týmto sa vymažú všetky tvoje dáta a obnoví sa pôvodný zoznam. Naozaj pokračovať?', function(){
      state = buildDefaultData();
      collapsedSet = new Set();
      filterMode = 'all';
      render(); scheduleSave();
    });
  }
}

async function init(){
  document.getElementById('app').innerHTML = '<div class="loading">Načítavam…</div>';
  document.querySelector('.app-shell').addEventListener('click', onAppClick);
  document.getElementById('app-header').addEventListener('click', onAppClick);

  // Zatvor dropdown klikom kdekoľvek mimo neho
  document.addEventListener('click', function(e){
    if(dropdownOpen && !e.target.closest('.cat-dropdown-wrap')){
      toggleDropdown(false);
    }
  });

  await loadData();

  const params = new URLSearchParams(location.search);
  const importParam = params.get('import');
  if(importParam){
    try{
      const imported = JSON.parse(decodeURIComponent(importParam));
      if(imported.categories && imported.items){
        history.replaceState(null, '', location.pathname);
        setTimeout(function(){ openImportModal(imported); }, 400);
      }
    }catch(e){}
  }
}
init();

  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js');
    });
  }
</script>
</body>
</html>
